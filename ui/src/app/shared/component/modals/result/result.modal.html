<div [ngStyle]="{'max-width': maxWidth}" class="card-modal mx-auto modal-width">
  <div *ngIf="imgUrl != ''" class="row mb-3">
    <div class="col p-0 text-center">
      <img alt="" src="{{imgUrl}}" style="width: 58px; height: 58px;">
    </div>
  </div>
  <div class="row mb-2 text-center">
    <div class="col f-26 f-w-600">{{ title }}</div>
  </div>
  <div class="row mb-3">
    <div class="col">
      <div [hidden]="!descriptionHTML" class="row mb-3 text-center text-break" ngbAutofocus>
        <label [innerHtml]="descriptionHTML" class="f-16 c-grey"></label>
      </div>
    </div>
  </div>
  <div class="row justify-content-center text-center">
    <div class="col">
      <button
        (click)="closeModal(true)"
        class="btn w-100 {{buttonClassList}}"
        data-target="#modal-success"
        data-toggle="modal"
        type="button">
        {{ 'Ok' }}
      </button>
    </div>
  </div>
</div>
