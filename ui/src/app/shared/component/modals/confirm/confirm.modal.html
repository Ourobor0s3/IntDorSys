<div class="card-modal mx-auto modal-width">
  @if (showTitle) {
    <div class="row mb-3">
      <div class="col f-26 f-w-600" ngbAutofocus>{{ title }}</div>
    </div>
  }
  <div class="col">
    <div class="col">
      <div [hidden]="!descriptionHTML" class="row mb-4 text-break">
        <label [innerHtml]="descriptionHTML" class="f-16 c-grey"></label>
      </div>
      <div class="row justify-content-center text-center">
        @if (showDeclineButton) {
          <div class="col">
            <button (click)="isConfirm(false)" class="btn btn-outline-primary w-100" type="button">
              {{ buttonDecline }}
            </button>
          </div>
        }
        @if (showConfirmButton) {
          <div class="col">
            <button (click)="isConfirm(true)" class="btn btn-primary w-100" type="button">
              {{ buttonConfirm }}
            </button>
          </div>
        }
        @if (showErrorButton) {
          <div class="col">
            <button (click)="isConfirm(true)" class="btn btn-danger w-100" type="button">
              {{ buttonError }}
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</div>
