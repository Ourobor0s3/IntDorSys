  <div class="d-flex flex-column h-100">
    <ul class="nav nav-pills d-flex flex-column gap-2">
      <li *ngFor="let menuItem of menuItems"
          [hidden]="needHidden(menuItem.roles)"
          class="nav-item">
        <a (click)="toggletNavActive(menuItem)"
           *ngIf="menuItem.type === 'link' && !menuItem.notShowInSidebar"
           [class.active]="menuItem.active"
           [routerLink]="!menuItem.type ? null : [menuItem.path]"
           class="nav-link">
          <div class="d-flex align-items-center gap-3">
            <img *ngIf="menuItem.image"
                 [alt]="menuItem.title"
                 [class.active-image]="menuItem.active"
                 [src]="menuItem.image"
                 height="24"
                 width="24">
            <span *ngIf="!isMobileMenuOpen" [class.active]="menuItem.active" class="menu-asset">
              {{ menuItem.title | lang }}
            </span>
          </div>
        </a>
      </li>
    </ul>
  </div>
</div>
