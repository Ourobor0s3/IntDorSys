<div class="reports-page">
  <div class="filter-bar">
    <div class="filter-group">
      <label class="filter-label">{{ 'laundress.start_date' | lang }}</label>
      <div class="input-group input-group-sm">
        <span class="input-group-text px-2">
          <img alt="Calendar" height="16" src="assets/image/table_icons/calendar.svg" width="16">
        </span>
        <input #dps="bsDatepicker"
               (click)="calendarClick('#bsCalendarStart')"
               (onShown)="setCalendarWidth('#bsCalendarStart')"
               [(bsValue)]="startDate" [bsConfig]="bsConfig"
               [ngClass]="{'iconShow' : dps.isOpen }" [readonly]="true"
               bsDatepicker class="form-control form-control-sm input-datepicker"
               id="bsCalendarStart" type="text">
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">{{ 'laundress.end_date' | lang }}</label>
      <div class="input-group input-group-sm">
        <span class="input-group-text px-2">
          <img alt="Calendar" height="16" src="assets/image/table_icons/calendar.svg" width="16">
        </span>
        <input #dpe="bsDatepicker"
               (click)="calendarClick('#bsCalendarEnd')"
               (onShown)="setCalendarWidth('#bsCalendarEnd')"
               [(bsValue)]="endDate" [bsConfig]="bsConfig"
               [ngClass]="{'iconShow' : dpe.isOpen }" [readonly]="true"
               bsDatepicker class="form-control form-control-sm input-datepicker"
               id="bsCalendarEnd" type="text">
      </div>
    </div>
    <div class="filter-actions">
      <button (click)="searchReports()" class="btn btn-sm btn-primary px-3" type="button">
        {{ 'laundress.filter' | lang }}
      </button>
      <button (click)="toggleSort()" class="btn btn-sm btn-outline-secondary" type="button">
        {{ sortDesc ? ('reports.newest' | lang) : ('reports.oldest' | lang) }}
      </button>
    </div>
  </div>

  <div *ngIf="sortedReports.length === 0" class="empty-state">
    <p class="text-muted">{{ 'common.no_data' | lang }}</p>
  </div>

  <div *ngIf="sortedReports.length > 0" class="reports-grid">
    <div *ngFor="let report of sortedReports; trackBy: trackByReport; let i = index" class="report-card">
      <div class="report-card-body">
        <div class="report-username">{{ report.username }}</div>

        <div *ngIf="report.files && report.files.length > 0; else noPhotos" class="report-gallery">
          <img *ngFor="let file of report.files; trackBy: trackByFile; let j = index"
               [src]="file.filePath" alt="report photo"
               class="report-thumb" (click)="openLightbox(report, j)" />
        </div>
        <ng-template #noPhotos>
          <div class="report-no-photos">{{ 'reports.no_photos' | lang }}</div>
        </ng-template>

        <div class="report-description">{{ report.description }}</div>
        <div class="report-date">{{ report.createdAt | date:"d.MM.yyyy HH:mm" }}</div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div *ngIf="lightboxReport" class="lightbox-backdrop" (click)="closeLightbox()"></div>
  <div *ngIf="lightboxReport" class="lightbox-modal card">
    <div class="card-body">
      <div class="lightbox-header">
        <div class="fw-semibold">{{ lightboxReport.username }}</div>
        <button type="button" class="btn-close" (click)="closeLightbox()"></button>
      </div>
      <img [src]="lightboxReport.files[lightboxIndex].filePath" alt="preview" class="lightbox-img" />
      <div *ngIf="lightboxReport.files.length > 1" class="lightbox-nav">
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="lightboxPrev()">
          {{ 'reports.prev' | lang }}
        </button>
        <span class="text-muted">{{ lightboxIndex + 1 }} / {{ lightboxReport.files.length }}</span>
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="lightboxNext()">
          {{ 'reports.next' | lang }}
        </button>
      </div>
    </div>
  </div>
</div>
