<div class="home-page">
  <div class="welcome-card">
    <h1 class="welcome-title">{{ 'home.welcome' | lang }}</h1>
    <p class="welcome-desc">{{ 'home.admin_description' | lang }}</p>
  </div>

  <div class="home-grid">
    <div *ngIf="laund != null" class="home-card">
      <div class="home-card-header">{{ laund.date }}</div>
      <div class="home-card-body">
        <div *ngIf="laund.laundModels == null || laund.laundModels.length === 0" class="empty-data">
          <p class="text-muted">{{ 'common.no_data' | lang }}</p>
        </div>
        <div *ngIf="laund.laundModels != null && laund.laundModels.length > 0">
          <div *ngFor="let l of laund.laundModels; trackBy: trackBySlot" class="slot-item">
            <span class="slot-time">{{ l.timeWash | date:'HH:mm' }}</span>
            <span class="slot-separator">—</span>
            <span class="slot-user">{{ l.selectUser?.fullName || ('laundress.free' | lang) }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="home-card chart-card">
      <div class="home-card-header">{{ 'chart.all_time_records' | lang }}</div>
      <div class="home-card-body">
        <app-bar-chart [chartInfo]="chart"></app-bar-chart>
      </div>
    </div>
  </div>
</div>
