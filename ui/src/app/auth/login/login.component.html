<div class="auth-form">
  <h2 class="text-center mb-4 f-w-600">{{ 'Login' | lang | uppercase }}</h2>

  <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" class="needs-validation">
    <div class="form-group mb-3">
      <div class="input-group">
        <span class="input-group-text">
          <img alt="Email Icon" height="20" src="/assets/image/fields/email.svg" width="20">
        </span>
        <input
          [attr.aria-label]="'Email' | lang"
          [attr.aria-required]="true"
          autofocus
          class="form-control"
          formControlName="email"
          id="email-field"
          placeholder="{{ 'Email' | lang }}"
          required
          type="email"
        >
      </div>
      <div *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched"
           class="invalid-feedback d-block">
        {{ 'Email is required' | lang }}
      </div>
      <div *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched"
           class="invalid-feedback d-block">
        {{ 'Please enter a valid email' | lang }}
      </div>
    </div>

    <div class="form-group mb-4">
      <div class="input-group">
        <span class="input-group-text">
          <img alt="Password Icon" height="20" src="/assets/image/fields/lock.svg" width="20">
        </span>
        <input
          [attr.aria-label]="'Password' | lang"
          [attr.aria-required]="true"
          [type]="showPass ? 'text' : 'password'"
          class="form-control"
          formControlName="password"
          id="pass-field"
          placeholder="{{ 'Password' | lang }}"
          required
        />
        <button
          (click)="hideOrShowPassword()"
          [attr.aria-label]="(showPass ? 'Hide password' : 'Show password') | lang"
          class="btn btn-outline-secondary"
          type="button"
        >
          <img
            [alt]="(showPass ? 'Hide password' : 'Show password') | lang"
            [src]="showPass ? '/assets/image/fields/eye_hide.svg' : '/assets/image/fields/eye_show.svg'"
            height="20"
            width="20"
          >
        </button>
      </div>
      <div *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched"
           class="invalid-feedback d-block">
        {{ 'Password is required' | lang }}
      </div>
    </div>

    <div class="d-grid gap-2">
      <button
        [disabled]="loginForm.invalid"
        class="btn btn-primary"
        id="sign-in-btn"
        type="submit"
      >
        {{ 'Login' | lang }}
      </button>
    </div>

    <div class="text-center mt-4">
      <span class="text-muted">{{ 'account.create' | lang }}</span>
      <a
        (click)="navigateToReg()"
        class="text-decoration-none ms-1"
        href="javascript:void(0)"
        role="button"
        tabindex="0"
      >
        {{ 'Registered' | lang }}
      </a>
    </div>
  </form>
</div>
