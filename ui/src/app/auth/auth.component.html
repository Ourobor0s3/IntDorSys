<div class="auth-container">
  <div class="auth-actions">
    <button class="auth-action-btn" (click)="changeLanguage()" [attr.title]="'language.' + (currentLang === 'en' ? 'ru' : 'en') | lang">
      <span class="fw-bold">{{ currentLang | uppercase }}</span>
    </button>
    <button class="auth-action-btn" (click)="toggleTheme()" [attr.title]="isDarkMode ? ('theme.light' | lang) : ('theme.dark' | lang)">
      @if (isDarkMode) {
        <img alt="Light mode" height="18" src="assets/image/table_icons/sun.svg" width="18"/>
      }
      @if (!isDarkMode) {
        <img alt="Dark mode" height="18" src="assets/image/table_icons/moon.svg" width="18"/>
      }
    </button>
  </div>
  <div class="container h-100">
    <div class="row h-100 justify-content-center align-items-center">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div [@animateRoute]="getCurrentState()" class="card shadow-sm">
          <div class="card-body p-4">
            <div class="auth-logo text-center">
              <img alt="Logo" src="assets/image/logo/logo.svg">
            </div>
            @if (subpagesMenu[0].isActive) {
              <app-login></app-login>
            }
            @if (subpagesMenu[1].isActive) {
              <app-register></app-register>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer class="auth-footer">
    <div class="text-muted text-center py-3">
      © {{ currentYear }} IntDorSys. All Rights Reserved
    </div>
  </footer>
</div>
