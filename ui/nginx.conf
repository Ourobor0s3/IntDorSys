server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    client_max_body_size 10m;

    # Backend API proxy (regex matches, order matters — must be before SPA fallback)
    # Uses regex to avoid prefix conflict: /laund matches API, /laundress serves SPA
    location ~ ^/(account/|user/|laund(/|$)|users-info|analitic|token|health|file) {
        proxy_pass http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # SPA fallback — never cache index.html so clients always fetch fresh build
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Hashed bundles: content hash in filename → long-lived immutable cache
    location ~* \.[a-f0-9]+\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
    }

    # Non-hashed assets (images, i18n, logos) — ETag-based, never stale
    location /assets/ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Fonts and other rarely-changed files — moderate cache
    location ~* \.(woff2?|eot|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate, no-transform";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
