name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('IntDorSys/**/*.csproj', 'IntDorSys/NuGet.Config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore and build backend
        run: |
          cd IntDorSys
          dotnet restore IntDorSys.sln --configfile NuGet.Config
          dotnet build IntDorSys.sln --no-restore

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/intdorsys
            git fetch origin
            git reset --hard origin/main
            docker compose up -d --build
