services:
  db:
    image: postgres:16-alpine
    container_name: intdorsys-db
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_HOST}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./IntDorSys
      dockerfile: Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT:-5050}
    container_name: intdorsys-backend
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://0.0.0.0:${BACKEND_PORT}
      BuildTest: ${BUILD_TEST}
      AutomaticMigrationsEnabled: "true"
      LOG_DIR: /tmp/logs/intdorsys
      ConnectionStrings__Test: "Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME_TEST};Username=${DB_USER};Password=${DB_PASSWORD};"
      ConnectionStrings__Battle: "Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};"
      Telegram__Test__Token: ${TELEGRAM_TEST_TOKEN}
      Telegram__Battle__Token: ${TELEGRAM_BATTLE_TOKEN}
      AdminIds__AdminChatId: ${ADMIN_CHAT_ID}
      AdminIds__ManagerLaundressId: ${MANAGER_LAUNDRESS_ID}
      AllowedOrigins__0: ${CORS_ORIGIN_1}
      AllowedOrigins__1: ${CORS_ORIGIN_2}
      Links__FrontUrl: ${FRONT_URL}
      Links__BackUrl: ${BACK_URL}
      Jwt__Secret: ${JWT_SECRET}
      Quartz__Enabled: "true"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - filestorage:/app/FileFolderStorage
      - ./logs:/tmp/logs/intdorsys
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: intdorsys-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  filestorage:
